# Publish @xiaolei.shawn/schema and @xiaolei.shawn/mcp-server to npm on GitHub Release.
# One NPM_TOKEN secret with read-write for scope @xiaolei.shawn covers both packages.

name: Release

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Bundle webapp into mcp-server for npm
        run: |
          mkdir -p mcp-server/dashboard-public
          cp -R webapp/dist/. mcp-server/dashboard-public/

      - name: Publish to npm
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
